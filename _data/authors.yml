# Author profiles for posts.
# Reference one from a post's front matter via `author: <id>` (single)
# or `authors: [<id>, ...]` (multiple). If omitted, posts fall back to
# `social.name` in _config.yml.
#
# Template › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/advanced-usage.md#setting-author-url
# -------------------------------------
# {author_id}:
#   name: {full name}
#   url: {homepage}
# -------------------------------------

federated:
  name: Federated Auto Parts Engineering
  url: https://github.com/federatedops
